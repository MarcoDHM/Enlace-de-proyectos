<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marco & Sebas | Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15);
        }

        .glow-bg {
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15), transparent 60%);
        }
    </style>
</head>

<body class="text-slate-100 min-h-screen relative pb-12">

    <div class="absolute top-0 left-1/4 w-96 h-96 glow-bg pointer-events-none blur-3xl animate-pulse duration-4000">
    </div>
    <div
        class="absolute bottom-10 right-1/4 w-96 h-96 glow-bg pointer-events-none blur-3xl animate-pulse duration-3000">
    </div>

    <header class="max-w-5xl mx-auto pt-10 px-6 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-3">
            <div
                class="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <span class="material-symbols-rounded text-white">folder_shared</span>
            </div>
            <h1
                class="text-2xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                MARCO <span class="text-slate-500 font-light">&</span> SEBAS
            </h1>
        </div>
        <span
            class="text-xs font-semibold uppercase tracking-widest bg-slate-800 px-4 py-2 rounded-full border border-slate-700 text-indigo-400">JSON
            Vault</span>
    </header>

    <main class="max-w-5xl mx-auto px-6 mt-16 relative z-10">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xl font-bold tracking-wide">Marcadores Compartidos</h3>
            <span id="counter"
                class="text-xs bg-indigo-950 text-indigo-400 border border-indigo-800/60 px-3 py-1 rounded-md font-mono">Cargando...</span>
        </div>

        <div id="linksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </main>

    <script>
        async function loadLinks() {
            const grid = document.getElementById('linksGrid');
            const counter = document.getElementById('counter');

            try {
                // Fetch directo a tu archivo enlaces.json
                const response = await fetch('enlaces.json');
                const data = await response.json();

                grid.innerHTML = '';
                counter.innerText = `${data.links.length} Links`;

                data.links.forEach((link, index) => {
                    const card = document.createElement('div');
                    card.className = "glass rounded-2xl p-5 flex flex-col justify-between opacity-0 translate-y-4 transition-all duration-500 ease-out group relative";

                    let displayUrl = link.url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").substring(0, 28);
                    if (link.url.length > 28) displayUrl += '...';

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="font-semibold text-slate-200 group-hover:text-indigo-400 transition-colors truncate w-full">${link.title}</h4>
                                <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-md ${link.added_by.toLowerCase() === 'marco' ? 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/20' : 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20'}">${link.added_by}</span>
                            </div>
                            <p class="text-xs text-slate-400 font-mono mb-4 truncate">${displayUrl}</p>
                        </div>
                        <a href="${link.url}" target="_blank" class="mt-4 w-full bg-slate-800/80 hover:bg-indigo-600 border border-slate-700/50 group-hover:border-indigo-500/50 text-slate-300 hover:text-white rounded-xl py-2 px-4 text-xs font-medium transition-all duration-300 flex items-center justify-center gap-1.5 shadow-sm">
                            Abrir enlace <span class="material-symbols-rounded text-sm transform group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </a>
                    `;

                    grid.appendChild(card);
                    setTimeout(() => card.classList.remove('opacity-0', 'translate-y-4'), index * 60);
                });
            } catch (error) {
                counter.innerText = "Error";
                grid.innerHTML = `<p class="text-rose-400 text-sm col-span-full text-center py-12">Error al cargar el archivo enlaces.json. Asegúrate de usar un servidor local (Live Server).</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadLinks);
    </script>
</body>

</html>
